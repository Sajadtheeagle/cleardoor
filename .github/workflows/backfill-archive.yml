name: Backfill News Archive

on:
  workflow_dispatch:
    inputs:
      start_month:
        description: 'Start month (YYYY-MM)'
        required: false
        default: '2020-01'
      end_month:
        description: 'End month (YYYY-MM, empty = current)'
        required: false
        default: ''

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run backfill
        run: |
          START="${{ github.event.inputs.start_month }}"
          END="${{ github.event.inputs.end_month }}"
          if [ -z "$END" ]; then
            node scripts/backfill-archive.js "$START"
          else
            node scripts/backfill-archive.js "$START" "$END"
          fi
      - name: Commit archive
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news-archive.json
          git diff --staged --quiet || git commit -m "chore: update news archive [skip ci]"
          git push
